<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MYRA | Where Every Gift Tells A Story</title>
<script src="config.js"></script>
<style>
body{font-family:Georgia,serif;background:#F8F5F0;margin:0;color:#2C1A0B}
.wrap{max-width:520px;margin:40px auto;background:#fff;padding:30px;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
h1{text-align:center}input,button{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:1px solid #ddd;box-sizing:border-box}
button{background:#2C1A0B;color:#fff;border:none;cursor:pointer}
.small{text-align:center;color:#777}
.modal{display:none}
</style>
</head>
<body>
<div class="wrap">
<h1>MYRA</h1>
<p class="small">Where Every Gift Tells A Story</p>

<input id="userName" placeholder="Enter your name">
<input id="userPhone" placeholder="Phone Number" maxlength="10">
<button onclick="handleLogin()">SIGN IN</button>

<hr>

<h3>Create Account</h3>
<input id="signupName" placeholder="Your Name">
<input id="signupPhone" placeholder="Phone Number" maxlength="10">
<input id="signupReferral" placeholder="Referral Code (Optional)">
<button onclick="signupUser()">SIGN UP</button>

<p class="small" id="referralInfo"></p>
</div>

<script>
const STORAGE={
LOGGED_IN:"myra_logged_in",
USER_NAME:"myra_user_name",
USER_PHONE:"myra_user_phone",
USER_ID:"myra_user_id"
};

function toast(msg){alert(msg);}

function validatePhone(phone){
 return /^[6-9][0-9]{9}$/.test(phone);
}

function saveUser(name,phone){
 localStorage.setItem(STORAGE.USER_NAME,name);
 localStorage.setItem(STORAGE.USER_PHONE,phone);
 localStorage.setItem(STORAGE.USER_ID,"MYRA-"+phone);
 localStorage.setItem(STORAGE.LOGGED_IN,"true");
}

function captureReferral(){
 const params=new URLSearchParams(location.search);
 const code=params.get("ref") || params.get("referral");
 if(code){
   localStorage.setItem("myra_referral_visit",code);
 }
 const saved=localStorage.getItem("myra_referral_visit");
 if(saved){
   const el=document.getElementById("signupReferral");
   if(el) el.value=saved;
   document.getElementById("referralInfo").innerText="Referral detected: "+saved;
 }
}

function handleLogin(){
 const name=document.getElementById("userName").value.trim();
 const phone=document.getElementById("userPhone").value.trim();

 if(name.length<2) return toast("Please enter your name");
 if(!validatePhone(phone)) return toast("Please enter valid phone");

 saveUser(name,phone);
 toast("Welcome Back To MYRA");
 location.href="home.html";
}

function signupUser(){
 const name=document.getElementById("signupName").value.trim();
 const phone=document.getElementById("signupPhone").value.trim();
 const referral=document.getElementById("signupReferral").value.trim();

 if(name.length<2) return toast("Please enter your name");
 if(!validatePhone(phone)) return toast("Please enter valid phone");

 saveUser(name,phone);

 if(referral){
   localStorage.setItem("myra_referred_by",referral);
   localStorage.setItem("myra_referral_code",referral);
 }

 toast("Welcome To MYRA");
 setTimeout(()=>location.href="home.html",1000);
}

captureReferral();
</script>
</body>
</html>
