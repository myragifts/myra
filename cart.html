<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Cart | MYRA</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2E2E2E">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

<script src="config.js"></script>
<link rel="stylesheet" href="common.css?v=1">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cormorant Garamond',serif;
}

:root{
--cream:#FFF8F0;
--gold:#C9A227;
--gold-dark:#8B6914;
--dark:#2E2E2E;
--sage:#7A8B6F;
--border:#E8E0D4;
--green:#059669;
--muted:#777;
}

body{
background:var(--cream);
color:var(--dark);
padding-bottom:92px;
}

.top-bar{
background:#2E2E2E;
color:#fff;
text-align:center;
padding:9px 12px;
font-size:13px;
font-weight:500;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.header{
padding:8px 18px;
background:#fff;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
}

.logo-wrap h1{
font-size:28px;
letter-spacing:4px;
color:#2E2E2E;
line-height:1;
}

.logo-wrap p{
font-size:12px;
color:#7A8B6F;
margin-top:2px;
}

.header-icons{
display:flex;
gap:10px;
}

.icon-btn{
width:42px;
height:42px;
border-radius:50%;
border:1px solid var(--border);
background:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
position:relative;
cursor:pointer;
}

.cart-count{
position:absolute;
top:-6px;
right:-4px;
background:#C9A227;
color:#fff;
font-size:12px;
font-weight:800;
width:20px;
height:20px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.page-head{
padding:28px 18px 18px;
}

.page-head h2{
font-size:42px;
line-height:1.05;
color:#1f1f1f;
}

.page-head p{
font-size:15px;
color:#777;
margin-top:6px;
}

.cart-area{
padding:0 18px 24px;
display:flex;
flex-direction:column;
gap:14px;
}

.cart-card{
background:#fff;
border:1px solid var(--border);
border-radius:24px;
padding:14px;
display:grid;
grid-template-columns:96px 1fr auto;
gap:14px;
align-items:center;
box-shadow:0 8px 24px rgba(0,0,0,.04);
}

.cart-img{
width:96px;
height:96px;
object-fit:cover;
border-radius:16px;
background:#f7f0e6;
}

.item-info h3{
font-size:24px;
line-height:1.05;
color:#2C1A0B;
margin-bottom:5px;
}

.item-info p{
font-size:14px;
color:#777;
margin-bottom:5px;
}

.qty-badge{
display:inline-block;
background:#F8F4EC;
border:1px solid var(--border);
border-radius:999px;
padding:5px 12px;
font-size:14px;
font-weight:700;
margin-top:4px;
}

.item-price{
text-align:right;
}

.item-price h4{
font-size:24px;
color:#111827;
margin-bottom:12px;
white-space:nowrap;
}

.remove-btn{
width:40px;
height:40px;
border-radius:12px;
border:1px solid var(--border);
background:#fff;
font-size:20px;
cursor:pointer;
}

.free-box{
margin:0 18px 14px;
background:#fff;
border:1px solid var(--border);
border-radius:24px;
padding:18px;
box-shadow:0 8px 24px rgba(0,0,0,.04);
}

.free-box h3{
font-size:22px;
display:flex;
align-items:center;
gap:10px;
color:#2E2E2E;
}

.free-line{
height:8px;
background:linear-gradient(135deg,#C9A227,#F1D981);
border-radius:999px;
margin-top:16px;
}

.summary-box,
.form-box{
margin:0 18px 14px;
background:#fff;
border:1px solid var(--border);
border-radius:24px;
padding:20px;
box-shadow:0 8px 24px rgba(0,0,0,.04);
}

.box-title{
display:flex;
align-items:center;
gap:12px;
font-size:28px;
margin-bottom:18px;
color:#2C1A0B;
}

.summary-row{
display:flex;
justify-content:space-between;
align-items:center;
font-size:19px;
margin:10px 0;
}

.summary-row strong{
font-weight:800;
}

.green{
color:#059669;
font-weight:800;
}

.total-row{
border-top:1px solid var(--border);
margin-top:14px;
padding-top:14px;
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
}

.total-row h3{
font-size:28px;
}

.total-row h2{
font-size:34px;
color:#111827;
white-space:nowrap;
}

.coupon-box{
border:1px solid var(--border);
border-radius:22px;
padding:14px;
margin-top:18px;
background:#FFFCF8;
}

.coupon-row{
display:grid;
grid-template-columns:1fr 110px;
gap:10px;
}

.coupon-row input{
height:48px;
border:1px solid var(--border);
border-radius:16px;
padding:0 15px;
font-size:16px;
outline:0;
text-transform:uppercase;
}

.coupon-row button{
height:48px;
border:0;
border-radius:16px;
background:linear-gradient(135deg,#C9A227,#F1D981);
color:#2E2E2E;
font-size:18px;
font-weight:800;
cursor:pointer;
}

.coupon-note{
font-size:14px;
color:#777;
margin-top:10px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.form-grid input{
height:50px;
border:1px solid var(--border);
border-radius:14px;
padding:0 15px;
font-size:16px;
outline:0;
background:#fff;
}

.full{
grid-column:1/-1;
}

.place-btn{
margin:0 18px 10px;
height:58px;
border:0;
border-radius:20px;
background:linear-gradient(135deg,#C9A227,#F1D981);
color:#2E2E2E;
font-size:26px;
font-weight:800;
cursor:pointer;
box-shadow:0 12px 28px rgba(201,162,39,.28);
width:calc(100% - 36px);
}

.secure-text{
text-align:center;
font-size:15px;
color:#777;
margin-bottom:24px;
}

.empty-box{
margin:40px 18px;
background:#fff;
border:1px solid var(--border);
border-radius:28px;
padding:34px 22px;
text-align:center;
box-shadow:0 8px 24px rgba(0,0,0,.04);
}

.empty-box h3{
font-size:34px;
color:#2C1A0B;
margin-bottom:8px;
}

.empty-box p{
font-size:16px;
color:#777;
line-height:1.6;
margin-bottom:20px;
}

.explore-btn{
border:0;
height:46px;
padding:0 28px;
border-radius:999px;
background:linear-gradient(135deg,#C9A227,#F1D981);
font-size:18px;
font-weight:800;
color:#2E2E2E;
}

.review-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
z-index:9998;
display:none;
align-items:flex-end;
justify-content:center;
}

.review-overlay.show{
display:flex;
}

.review-popup{
width:100%;
max-width:720px;
max-height:88vh;
background:#fff;
border-radius:32px 32px 0 0;
padding:26px 18px 90px;
overflow:auto;
animation:slideUp .28s ease;
}

@keyframes slideUp{
from{transform:translateY(100%);opacity:.3;}
to{transform:translateY(0);opacity:1;}
}

.review-popup h2{
font-size:40px;
margin-bottom:18px;
}

.review-card{
border:1px solid var(--border);
border-radius:22px;
padding:18px;
margin-bottom:14px;
}

.review-card h3{
font-size:24px;
margin-bottom:12px;
}

.review-line{
display:flex;
justify-content:space-between;
gap:12px;
font-size:18px;
padding:6px 0;
}

.review-line b{
text-align:right;
}

.review-actions{
position:fixed;
left:0;
right:0;
bottom:0;
z-index:9999;
background:#fff;
padding:12px;
display:none;
grid-template-columns:1fr 1fr 1.2fr;
gap:10px;
border-top:1px solid var(--border);
}

.review-actions.show{
display:grid;
}

.review-actions button{
height:54px;
border-radius:18px;
font-size:18px;
font-weight:800;
cursor:pointer;
}

.back-btn{
border:1px solid var(--border);
background:#F8F4EC;
color:#2E2E2E;
}

.edit-btn{
border:1px solid #D4AF37;
background:#fff;
color:#8B6914;
}

.confirm-btn{
border:0;
background:linear-gradient(135deg,#C9A227,#F1D981);
color:#2E2E2E;
}

.bottom-nav{
position:fixed;
left:0;
right:0;
bottom:0;
height:72px;
background:#fff;
border-top:1px solid var(--border);
display:grid;
grid-template-columns:repeat(5,1fr);
z-index:1000;
}

.nav-item{
border:0;
background:transparent;
color:#777;
font-size:13px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:4px;
}

.nav-item strong{
font-size:22px;
line-height:1;
font-weight:400;
}

.nav-item.active{
color:#9B7B22;
font-weight:800;
}

.toast{
position:fixed;
left:50%;
bottom:92px;
transform:translateX(-50%) translateY(20px);
background:linear-gradient(135deg,#FFF8E6,#FFF3C4);
border:2px solid #D4AF37;
color:#8B6914;
padding:14px 22px;
border-radius:18px;
font-size:16px;
font-weight:800;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:99999;
box-shadow:0 10px 30px rgba(212,175,55,.25);
text-align:center;
max-width:86%;
}

.toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

@media(min-width:768px){
.cart-area{
display:grid;
grid-template-columns:1fr 1fr;
}

.cart-card{
grid-template-columns:120px 1fr auto;
}

.cart-img{
width:120px;
height:120px;
}

.form-grid{
grid-template-columns:repeat(3,1fr);
}
}

@media(max-width:420px){
.cart-card{
grid-template-columns:86px 1fr auto;
gap:10px;
padding:12px;
}

.cart-img{
width:86px;
height:86px;
}

.item-info h3{
font-size:21px;
}

.item-price h4{
font-size:20px;
}

.coupon-row{
grid-template-columns:1fr 90px;
}

.page-head h2{
font-size:38px;
}
}
</style>
</head>

<body>

<div class="top-bar">Shipping ₹40 below ₹499 • Free shipping on ₹499+</div>

<div class="header">
<div class="logo-wrap">
<h1>MYRA</h1>
<p>Make Home Everywhere</p>
</div>

<div class="header-icons">
<div class="icon-btn" onclick="goFavourites()">♡</div>
<div class="icon-btn" onclick="goCart()">🛒<span class="cart-count" id="topCartCount">0</span></div>
<div class="icon-btn" onclick="goProfile()">👤</div>
</div>
</div>

<div class="page-head">
<h2 id="cartTitle">My Cart</h2>
<p>Review your items and proceed to checkout</p>
</div>

<div id="cartContent"></div>

<nav class="bottom-nav">
<button class="nav-item" onclick="goHome()"><strong>🏠</strong>Home</button>
<button class="nav-item" onclick="goCategory()"><strong>☰</strong>Categories</button>
<button class="nav-item" onclick="goFavourites()"><strong>♡</strong>Favourites</button>
<button class="nav-item active" onclick="goCart()"><strong>🛒</strong>Cart</button>
<button class="nav-item" onclick="goProfile()"><strong>👤</strong>Profile</button>
</nav>

<div class="toast" id="toast"></div>

<div class="review-overlay" id="reviewOverlay">
<div class="review-popup" id="reviewPopup"></div>
</div>

<div class="review-actions" id="reviewActions">
<button class="back-btn" onclick="closeReview()">Back</button>
<button class="edit-btn" onclick="closeReview()">Edit Address</button>
<button class="confirm-btn" onclick="confirmOrder()">Confirm Order</button>
</div>

<script>
const ADMIN_WHATSAPP = "919836697502";
const PAYMENT_LINK = "https://tinyurl.com/myra-pay-now";

let appliedCoupon = localStorage.getItem("myra_coupon_code") || null;
let appliedDiscount = Number(localStorage.getItem("myra_coupon_discount") || 0);
let latestOrder = null;

function showToast(msg){
const toast = document.getElementById("toast");
toast.innerText = "✨ " + msg;
toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},3000);
}

function goHome(){
location.href="home.html";
}

function goCategory(){
location.href="category.html";
}

function goFavourites(){
location.href="favourites.html";
}

function goCart(){
location.href="cart.html";
}

function goProfile(){
location.href="profile.html";
}

function getCartItems(){
return JSON.parse(localStorage.getItem("myra_cart") || "[]");
}

function saveCartItems(items){
localStorage.setItem("myra_cart", JSON.stringify(items));
localStorage.setItem("myra_cart_last_update", Date.now());
}

function money(n){
return "₹" + Number(n || 0).toLocaleString("en-IN");
}

function getQty(item){
return Number.parseInt(item.qty || item.quantity || item.selected_quantity || 1) || 1;
}

function getUnitPrice(item){
return Number(item.price || item.unit_price || item.final_unit_price || 0);
}

function getMrp(item){
return Number(item.mrp || item.price || 0);
}

function getLineTotal(item){
const qty = getQty(item);
const price = getUnitPrice(item);

if(item.line_total){
return Number(item.line_total);
}

if(item.final_total){
return Number(item.final_total);
}

if(item.final_price && Number(item.final_price) > price){
return Number(item.final_price);
}

return price * qty;
}

function getNormalTotal(item){
const qty = getQty(item);
const mrp = getMrp(item);
return mrp * qty;
}

function calcTotals(){
const cart = getCartItems();
let subtotal = 0;
let totalMrp = 0;

cart.forEach(item=>{
subtotal += getLineTotal(item);
totalMrp += getNormalTotal(item);
});

const save = Math.max(totalMrp - subtotal, 0);
const shipping = subtotal >= 499 || subtotal === 0 ? 0 : 40;
const grandBeforeCoupon = subtotal + shipping;
const couponDiscount = Math.min(appliedDiscount, grandBeforeCoupon);
const grandTotal = Math.max(grandBeforeCoupon - couponDiscount, 0);

return {cart, subtotal, totalMrp, save, shipping, couponDiscount, grandTotal};
}

function renderCart(){
const data = calcTotals();
const cart = data.cart;

document.getElementById("topCartCount").innerText = cart.length;
document.getElementById("cartTitle").innerText = `My Cart (${cart.length})`;

if(!cart.length){
document.getElementById("cartContent").innerHTML = `
<div class="empty-box">
<h3>Your cart is empty</h3>
<p>Add candles you love and checkout easily.</p>
<button class="explore-btn" onclick="goCategory()">Explore Candles</button>
</div>
`;
return;
}

document.getElementById("cartContent").innerHTML = `
<div class="cart-area">
${cart.map((item,index)=>{
const qty = getQty(item);
const total = getLineTotal(item);
const name = item.name || item.product_name || "MYRA Product";
const img = item.image1 || item.image || "";
const fragrance = item.fragrance || item.short_description || "Premium Candle";
const wax = item.wax_type || "";
const label = item.label || "MYRA";
return `
<div class="cart-card">
<img class="cart-img" src="${img}" alt="${name}">
<div class="item-info">
<h3>${name}</h3>
<p>${fragrance}${wax ? " • " + wax : ""}</p>
<span class="qty-badge">Qty: ${qty}</span>
<p>${label}</p>
</div>
<div class="item-price">
<button class="remove-btn" onclick="removeCartItem(${index})">🗑</button>
<h4>${money(total)}</h4>
</div>
</div>
`;
}).join("")}
</div>

<div class="free-box">
<h3>🎁 You got ${data.shipping === 0 ? "Free Shipping" : "Shipping ₹40"} on this order</h3>
<div class="free-line"></div>
</div>

<div class="summary-box">
<div class="box-title">🏷 Order Summary</div>
<div class="summary-row"><span>Total MRP</span><strong>${money(data.totalMrp)}</strong></div>
<div class="summary-row"><span>Discount</span><strong class="green">-${money(data.save)}</strong></div>
${appliedCoupon ? `<div class="summary-row"><span>Coupon (${appliedCoupon})</span><strong class="green">-${money(data.couponDiscount)}</strong></div>` : ""}
<div class="summary-row"><span>Shipping</span><strong class="green">${data.shipping === 0 ? "FREE" : money(data.shipping)}</strong></div>
<div class="total-row"><h3>Order Total</h3><h2>${money(data.grandTotal)}</h2></div>

<div class="coupon-box">
<div class="coupon-row">
<input id="couponInput" placeholder="ENTER COUPON CODE">
<button onclick="applyCoupon()">Apply</button>
</div>
<div class="coupon-note">Have a coupon? Apply it here</div>
</div>
</div>

<div class="form-box">
<div class="box-title">📍 Customer Details</div>
<div class="form-grid">
<input id="custName" placeholder="Full Name">
<input id="custPhone" type="tel" inputmode="numeric" maxlength="10" placeholder="Phone Number">
<input id="village" placeholder="Village">
<input id="postOffice" placeholder="Post Office">
<input id="policeStation" placeholder="Police Station">
<input id="district" placeholder="District">
<input id="state" placeholder="State">
<input id="pinCode" type="tel" inputmode="numeric" maxlength="6" placeholder="Pincode">
<input id="landmark" placeholder="Landmark">
</div>
</div>

<button class="place-btn" onclick="placeOrder()">Place Order →</button>
<div class="secure-text">🛡 Secure Checkout • 100% Safe Payments</div>
`;
}

function removeCartItem(index){
let cart = getCartItems();
cart.splice(index,1);
saveCartItems(cart);

if(!cart.length){
localStorage.removeItem("myra_coupon_code");
localStorage.removeItem("myra_coupon_discount");
appliedCoupon = null;
appliedDiscount = 0;
}

showToast("Removed from cart");
renderCart();
}

function applyCoupon(){
const code = document.getElementById("couponInput").value.trim().toUpperCase();
const subtotal = calcTotals().subtotal;

if(!code){
showToast("Please enter coupon code");
return;
}

let discount = 0;

if(code === "WELCOME"){
discount = Math.round(subtotal * 0.10);
}else if(code === "SPECIAL"){
discount = Math.round(subtotal * 0.15);
}else if(code === "SPECIAL10"){
discount = Math.round(subtotal * 0.10);
}else if(code === "SPECIAL15"){
discount = Math.round(subtotal * 0.15);
}else if(code === "SPECIAL20"){
discount = Math.round(subtotal * 0.20);
}else{
showToast("Invalid coupon code");
return;
}

appliedCoupon = code;
appliedDiscount = discount;

localStorage.setItem("myra_coupon_code", appliedCoupon);
localStorage.setItem("myra_coupon_discount", appliedDiscount);

showToast("Coupon applied");
renderCart();
}

function getCustomerDetails(){
return {
name:document.getElementById("custName").value.trim(),
phone:document.getElementById("custPhone").value.trim(),
village:document.getElementById("village").value.trim(),
postOffice:document.getElementById("postOffice").value.trim(),
policeStation:document.getElementById("policeStation").value.trim(),
district:document.getElementById("district").value.trim(),
state:document.getElementById("state").value.trim(),
pinCode:document.getElementById("pinCode").value.trim(),
landmark:document.getElementById("landmark").value.trim()
};
}

function validateCustomer(c){
if(!c.name || !c.phone || !c.village || !c.postOffice || !c.policeStation || !c.district || !c.state || !c.pinCode || !c.landmark){
showToast("Please fill all fields");
return false;
}

if(!/^[0-9]{10}$/.test(c.phone)){
showToast("Wrong phone number");
return false;
}

if(!/^[0-9]{6}$/.test(c.pinCode)){
showToast("Wrong pin code");
return false;
}

return true;
}

function placeOrder(){
const cart = getCartItems();

if(!cart.length){
showToast("Your cart is empty");
return;
}

const customer = getCustomerDetails();

if(!validateCustomer(customer)){
return;
}

const totals = calcTotals();

latestOrder = {
orderId:"MY" + Date.now(),
dateTime:new Date().toLocaleString("en-IN"),
customer,
items:cart,
coupon:appliedCoupon,
couponDiscount:totals.couponDiscount,
subtotal:totals.subtotal,
shipping:totals.shipping,
grandTotal:totals.grandTotal
};

openReview(latestOrder);
}

function openReview(order){
const popup = document.getElementById("reviewPopup");
const c = order.customer;

popup.innerHTML = `
<h2>Order Review</h2>

<div class="review-card">
<h3>Customer Details</h3>
<div class="review-line"><span>Name</span><b>${c.name}</b></div>
<div class="review-line"><span>Phone</span><b>${c.phone}</b></div>
<div class="review-line"><span>Village</span><b>${c.village}</b></div>
<div class="review-line"><span>Post Office</span><b>${c.postOffice}</b></div>
<div class="review-line"><span>Police Station</span><b>${c.policeStation}</b></div>
<div class="review-line"><span>District</span><b>${c.district}</b></div>
<div class="review-line"><span>State</span><b>${c.state}</b></div>
<div class="review-line"><span>Pin Code</span><b>${c.pinCode}</b></div>
<div class="review-line"><span>Landmark</span><b>${c.landmark}</b></div>
</div>

<div class="review-card">
<h3>Product Details</h3>
${order.items.map(item=>{
const qty = getQty(item);
const price = getUnitPrice(item);
const total = getLineTotal(item);
return `
<div style="border-bottom:1px solid #eee;padding-bottom:10px;margin-bottom:10px;">
<div class="review-line"><span>Product Name</span><b>${item.name || item.product_name || "MYRA Product"}</b></div>
<div class="review-line"><span>Product ID</span><b>${item.product_id || item.id || "-"}</b></div>
<div class="review-line"><span>Quantity</span><b>${qty}</b></div>
<div class="review-line"><span>Price</span><b>${money(price)}</b></div>
<div class="review-line"><span>Total</span><b>${money(total)}</b></div>
</div>
`;
}).join("")}
</div>

<div class="review-card">
<h3>Order Summary</h3>
<div class="review-line"><span>Subtotal</span><b>${money(order.subtotal)}</b></div>
${order.coupon ? `<div class="review-line"><span>Coupon</span><b>${order.coupon}</b></div>
<div class="review-line"><span>Coupon Discount</span><b>-${money(order.couponDiscount)}</b></div>` : ""}
<div class="review-line"><span>Shipping</span><b>${order.shipping === 0 ? "Free" : money(order.shipping)}</b></div>
<div class="review-line"><span>Total Order Value</span><b>${money(order.grandTotal)}</b></div>
</div>
`;

document.getElementById("reviewOverlay").classList.add("show");
document.getElementById("reviewActions").classList.add("show");
document.querySelector(".bottom-nav").style.display = "none";
}

function closeReview(){
document.getElementById("reviewOverlay").classList.remove("show");
document.getElementById("reviewActions").classList.remove("show");
document.querySelector(".bottom-nav").style.display = "grid";
}

function buildWhatsappMessage(order){
const c = order.customer;

let productsText = order.items.map(item=>{
const qty = getQty(item);
const price = getUnitPrice(item);
const total = getLineTotal(item);

return `Product ID: ${item.product_id || item.id || "-"}
Product Name: ${item.name || item.product_name || "MYRA Product"}
Quantity: ${qty}
Price: ${money(price)}
Total: ${money(total)}`;
}).join(`

--------------------------------

`);

let couponText = "";

if(order.coupon){
couponText = `
Coupon: ${order.coupon}
Coupon Discount: ${money(order.couponDiscount)}
`;
}

return `🕯️ MYRA NEW ORDER

Order ID: ${order.orderId}
Date Time: ${order.dateTime}

Customer Details:
Name: ${c.name}
Phone: ${c.phone}
Village: ${c.village}
Post Office: ${c.postOffice}
Police Station: ${c.policeStation}
District: ${c.district}
State: ${c.state}
Pin Code: ${c.pinCode}
Landmark: ${c.landmark}

Product Details:

${productsText}

Shipping: ${order.shipping === 0 ? "Free" : money(order.shipping)}

Order Summary

Subtotal: ${money(order.subtotal)}${couponText}
Total Order Value: ${money(order.grandTotal)}

Pay Here:
${PAYMENT_LINK}

👉 PLEASE PAY ${money(order.grandTotal)} AND SEND PAYMENT SCREENSHOT TO CONFIRM YOUR ORDER.

Thank you for shopping with MYRA`;
}

function confirmOrder(){
if(!latestOrder){
showToast("Order not found");
return;
}

let orders = JSON.parse(localStorage.getItem("myra_orders") || "[]");
orders.push(latestOrder);

localStorage.setItem("myra_orders", JSON.stringify(orders));
localStorage.removeItem("myra_cart");
localStorage.removeItem("myra_coupon_code");
localStorage.removeItem("myra_coupon_discount");
localStorage.removeItem("myra_cart_last_update");

showToast("Order confirmed");

const message = buildWhatsappMessage(latestOrder);
const whatsappUrl = "https://wa.me/" + ADMIN_WHATSAPP + "?text=" + encodeURIComponent(message);

setTimeout(()=>{
window.open(whatsappUrl,"_blank");
location.href = "home.html";
},700);
}

renderCart();
</script>
